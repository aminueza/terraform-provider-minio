name: Docs CI
on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-templates:
    name: Check Doc Templates
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.2

      - name: Verify all resources and data sources have doc templates
        run: |
          MISSING=0

          # Extract resource and data source names from ResourcesMap and DataSourcesMap only
          # Uses sed to isolate the map blocks, then greps for "minio_*" keys
          RESOURCES=$(sed -n '/ResourcesMap:/,/^[[:space:]]*},$/p' minio/provider.go | grep -oP '"minio_\K[^"]+')
          DATASOURCES=$(sed -n '/DataSourcesMap:/,/^[[:space:]]*},$/p' minio/provider.go | grep -oP '"minio_\K[^"]+')

          for name in $RESOURCES; do
            if [ ! -f "templates/resources/${name}.md.tmpl" ]; then
              echo "::error::Missing doc template for resource 'minio_${name}'. Create templates/resources/${name}.md.tmpl"
              MISSING=$((MISSING + 1))
            fi
          done

          for name in $DATASOURCES; do
            if [ ! -f "templates/data-sources/${name}.md.tmpl" ]; then
              echo "::error::Missing doc template for data source 'minio_${name}'. Create templates/data-sources/${name}.md.tmpl"
              MISSING=$((MISSING + 1))
            fi
          done

          if [ "$MISSING" -gt 0 ]; then
            echo ""
            echo "Found ${MISSING} resource(s)/data source(s) without doc templates."
            echo "Run 'task generate-docs' after creating templates to generate the docs."
            exit 1
          fi

          echo "All resources and data sources have doc templates."

  generate-docs:
    name: Generate Docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GOARCH: amd64
      GOOS: linux
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.2
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Generate docs
        run: go run github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@v0.25.0

      - name: Open PR with updated docs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "Docs are already up to date."
            exit 0
          fi
          BRANCH="docs/auto-update-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "docs: auto-generate provider documentation"
          git push origin "$BRANCH"
          gh pr create \
            --title "docs: auto-generate provider documentation" \
            --body "Automated docs update triggered by a push to main. Generated by the Docs CI workflow." \
            --head "$BRANCH" \
            --base main

  mdvalidate:
    name: Validate Markdown Files
    runs-on: ubuntu-latest
    env:
      GOARCH: amd64
      GOOS: linux
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.2
        with:
          fetch-depth: 1

      - name: Markdown Link Validation
        uses: tcort/github-action-markdown-link-check@e7c7a18363c842693fadde5d41a3bd3573a7a225 # v1
        with:
          config-file: "./.github/github-action-markdown-link-check-config.json"
