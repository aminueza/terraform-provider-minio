name: Docs CI
on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-templates:
    name: Check Doc Templates
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check out code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

      - name: Verify all resources and data sources have doc templates
        run: |
          MISSING=0

          # Extract resource type names from framework resource files (v4 uses terraform-plugin-framework)
          # Matches: resp.TypeName = req.ProviderTypeName + "_<name>" and strips the leading "_"
          RESOURCES=$(grep -rh 'resp\.TypeName = req\.ProviderTypeName + "_' minio/resource_*_framework.go \
            | grep -oP '"_\K[^"]+' || true)

          # Extract data source type names from framework data source files
          DATASOURCES=$(grep -rh 'resp\.TypeName = req\.ProviderTypeName + "_' minio/data_source_*_framework.go \
            | grep -oP '"_\K[^"]+' || true)

          # Also check legacy SDK data sources still registered in provider.go
          SDK_DATASOURCES=$(sed -n '/DataSourcesMap:/,/^[[:space:]]*},$/p' minio/provider.go \
            | grep -oP '"minio_\K[^"]+' || true)

          for name in $RESOURCES; do
            if [ ! -f "templates/resources/${name}.md.tmpl" ]; then
              echo "::error::Missing doc template for resource 'minio_${name}'. Create templates/resources/${name}.md.tmpl"
              MISSING=$((MISSING + 1))
            fi
          done

          for name in $DATASOURCES $SDK_DATASOURCES; do
            if [ ! -f "templates/data-sources/${name}.md.tmpl" ]; then
              echo "::error::Missing doc template for data source 'minio_${name}'. Create templates/data-sources/${name}.md.tmpl"
              MISSING=$((MISSING + 1))
            fi
          done

          if [ "$MISSING" -gt 0 ]; then
            echo ""
            echo "Found ${MISSING} resource(s)/data source(s) without doc templates."
            echo "Run 'task generate-docs' after creating templates to generate the docs."
            exit 1
          fi

          echo "All resources and data sources have doc templates."

  generate-docs:
    name: Generate Docs
    needs: check-templates
    if: |
      (always() && !cancelled() && needs.check-templates.result == 'success' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)) ||
      github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GOARCH: amd64
      GOOS: linux
    steps:
      - name: Check out code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Generate docs
        run: go run github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@latest

      - name: Commit updated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "Docs are already up to date."
          else
            git commit -m "docs: auto-generate provider documentation [skip ci]"
            git push
          fi

  mdvalidate:
    name: Validate Markdown Files
    runs-on: ubuntu-latest
    env:
      GOARCH: amd64
      GOOS: linux
    steps:
      - name: Check out code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2
        with:
          fetch-depth: 1

      - name: Markdown Link Validation
        uses: tcort/github-action-markdown-link-check@e7c7a18363c842693fadde5d41a3bd3573a7a225 # v1
        with:
          config-file: "./.github/github-action-markdown-link-check-config.json"
