name: Terraform Provider CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mfa-check:
    name: MFA Compliance Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5

    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Check MFA for PR author
        run: |
          # Check if PR author has MFA enabled using GitHub API
          AUTHOR="${{ github.event.pull_request.user.login }}"
          echo "Checking MFA status for user: $AUTHOR"

          # Use GitHub CLI to check user MFA status
          if ! gh api users/$AUTHOR --jq '.two_factor_authentication' | grep -q true; then
            echo "❌ Error: PR author $AUTHOR does not have MFA enabled"
            echo "Please enable MFA on your GitHub account and try again"
            exit 1
          else
            echo "✅ MFA check passed for user: $AUTHOR"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    needs: mfa-check
    timeout-minutes: 15
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --config .github/golangci.yml

      - name: Run Gosec Security Scanner
        uses: securego/gosec@v2.22.11
        with:
          args: -fmt sarif -out gosec.sarif ./

      - name: Upload security scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec.sarif

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    env:
      GOARCH: amd64
      GOOS: linux
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build test environment
        run: |
          docker compose build
          docker compose up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for MinIO services to be ready..."
          timeout 60 bash -c 'until docker compose exec -T minio mc admin info local; do sleep 2; done'
          echo "All services are ready!"

      - name: Run tests
        run: docker compose run --rm test

      - name: Cleanup test environment
        if: always()
        run: docker compose down -v
