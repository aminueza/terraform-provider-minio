name: Terraform Provider CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --config .github/golangci.yml

      - name: Run Gosec Security Scanner
        uses: securego/gosec@v2.22.11
        with:
          args: -fmt sarif -out gosec.sarif ./

      - name: Upload security scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: gosec.sarif

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    env:
      GOARCH: amd64
      GOOS: linux
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build test environment
        run: |
          docker compose build
          docker compose up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for MinIO services to be ready..."
          timeout 120 bash -c 'until docker compose exec -T minio mc admin info --json local >/dev/null 2>&1; do sleep 2; done'
          echo "All services are ready!"

      - name: Run tests
        run: docker compose run --rm test
        env:
          TEST_PATTERN: "-skip TestAccMinioS3Bucket_objectLocking"

      - name: Cleanup test environment
        if: always()
        run: docker compose down -v
