name: Terraform Provider CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: latest
          args: --config .github/golangci.yml

      - name: Run Gosec Security Scanner
        id: gosec
        uses: securego/gosec@9e6a9843d7a4a6e3e9a8539b02612c8a4aa3f889 # v2.27.1
        continue-on-error: true
        env:
          GOTOOLCHAIN: auto
        with:
          args: -fmt sarif -out gosec.sarif -exclude-dir=vendor -tests=false -exclude=G101 ./

      - name: Upload security scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        if: always() && hashFiles('gosec.sarif') != ''
        with:
          sarif_file: gosec.sarif

      - name: Fail on Gosec findings
        if: always() && steps.gosec.outcome == 'failure'
        run: |
          echo "## Gosec Security Scanner Found Issues" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f gosec.sarif ]; then
            echo "| Rule | File | Line | Description |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|------|-------------|" >> $GITHUB_STEP_SUMMARY
            jq -r '.runs[0].results[] | "| \(.ruleId) | \(.locations[0].physicalLocation.artifactLocation.uri) | \(.locations[0].physicalLocation.region.startLine) | \(.message.text) |"' gosec.sarif >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See the **Security** tab for full details." >> $GITHUB_STEP_SUMMARY
          exit 1

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    env:
      GOARCH: amd64
      GOOS: linux
    steps:
      - name: Check out the repository
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Cache Docker layers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build test environment
        run: |
          docker compose build
          docker compose up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for MinIO services to be ready..."
          timeout 120 bash -c 'until docker compose exec -T minio mc admin info --json local >/dev/null 2>&1; do sleep 2; done'
          echo "All services are ready!"

      - name: Run tests
        run: docker compose run --rm test

      - name: Cleanup test environment
        if: always()
        run: docker compose down -v
