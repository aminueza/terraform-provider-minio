name: Update Go Toolchain

on:
  schedule:
    - cron: "0 6 * * 1" # Monday 6am UTC, same cadence as Dependabot
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-toolchain:
    name: Bump toolchain directive to latest patch
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out the repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: "go.mod"
          cache: false

      - name: Bump toolchain to latest patch
        run: |
          go get toolchain@patch
          go mod tidy

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet go.mod go.sum; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            # After `go get toolchain@patch`, go.mod will have a `toolchain goX.Y.Z` line
            # when the new patch differs from the `go` minimum directive.
            # If `go` and `toolchain` are equal, tidy removes the toolchain line and
            # updates the `go` line instead.
            TOOLCHAIN=$(grep '^toolchain' go.mod | awk '{print $2}')
            if [ -z "$TOOLCHAIN" ]; then
              TOOLCHAIN=$(grep '^go ' go.mod | awk '{print "go"$2}')
            fi
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "toolchain=${TOOLCHAIN}" >> "$GITHUB_OUTPUT"
          fi

      - name: Update docker-compose.yml Go image
        if: steps.diff.outputs.changed == 'true'
        run: |
          TOOLCHAIN="${{ steps.diff.outputs.toolchain }}"
          # Strip the 'go' prefix for the image tag: go1.27.3 -> 1.27.3
          TAG="${TOOLCHAIN#go}"
          sed -i "s/^    image: golang:.*/    image: golang:${TAG}/" docker-compose.yml

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TOOLCHAIN="${{ steps.diff.outputs.toolchain }}"
          BRANCH="chore/toolchain-${TOOLCHAIN}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"
          git add go.mod go.sum docker-compose.yml
          git commit -m "chore: update Go toolchain to ${TOOLCHAIN}"
          git push origin "${BRANCH}"

          gh pr create \
            --title "chore: update Go toolchain to ${TOOLCHAIN}" \
            --body 'Automated weekly toolchain bump via `go get toolchain@patch`.' \
            --head "${BRANCH}" \
            --base main \
            --reviewer aminueza \
            --label "dependencies"
